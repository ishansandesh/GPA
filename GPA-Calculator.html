<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic GPA Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --shadow-dark: #000000;
            --shadow-light: #3a3a3a;
            --border-color: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
            flex-wrap: wrap;
            gap: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -1px;
            width: 100%;
        }

        /* Neumorphic Tabs */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: 
                inset 3px 3px 8px var(--shadow-dark),
                inset -3px -3px 8px var(--shadow-light);
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 
                3px 3px 8px var(--shadow-dark),
                -3px -3px 8px var(--shadow-light);
        }

        .tab:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
        }

        .tab:active {
            box-shadow: 
                inset 2px 2px 5px var(--shadow-dark),
                inset -2px -2px 5px var(--shadow-light);
            transform: scale(0.98);
        }

        .tab.active {
            color: var(--text-primary);
            background: linear-gradient(135deg, #ffffff 0%, #d0d0d0 100%);
            color: #000000;
            font-weight: 700;
            box-shadow: 
                5px 5px 12px var(--shadow-dark),
                -5px -5px 12px var(--shadow-light);
        }

        .tab.active:hover {
            transform: translateY(-3px);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Neumorphic Card */
        .card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 
                12px 12px 24px var(--shadow-dark),
                -12px -12px 24px var(--shadow-light);
            transform: translateY(-4px);
        }

        /* Results Card */
        .results-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
        }

        .results-card.card {
            box-shadow: 
                10px 10px 20px var(--shadow-dark),
                -10px -10px 20px var(--shadow-light),
                inset -2px -2px 8px rgba(255, 255, 255, 0.05),
                inset 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 25px;
        }

        .result-item {
            text-align: center;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .result-item:hover {
            box-shadow: 
                6px 6px 14px var(--shadow-dark),
                -6px -6px 14px var(--shadow-light);
            transform: translateY(-2px);
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            animation: countUp 0.6s ease;
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Form Section */
        .form-section {
            grid-column: 1 / -1;
        }

        .form-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-primary);
        }

        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .courses-list::-webkit-scrollbar {
            width: 8px;
        }

        .courses-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        .courses-list::-webkit-scrollbar-thumb {
            background: var(--shadow-light);
            border-radius: 4px;
        }

        .courses-list::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        /* Course Row - Neumorphic */
        .course-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 0.5fr;
            gap: 12px;
            align-items: end;
            padding: 18px;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .course-row:hover {
            box-shadow: 
                6px 6px 14px var(--shadow-dark),
                -6px -6px 14px var(--shadow-light);
            transform: translateY(-2px);
        }

        .course-row:active {
            box-shadow: 
                inset 2px 2px 6px var(--shadow-dark),
                inset -2px -2px 6px var(--shadow-light);
            transform: scale(0.99);
        }

        @media (max-width: 768px) {
            .course-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Neumorphic Input Fields */
        input, select {
            padding: 12px 14px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 500;
            box-shadow: 
                inset 2px 2px 6px var(--shadow-dark),
                inset -2px -2px 6px var(--shadow-light);
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 
                inset 3px 3px 8px var(--shadow-dark),
                inset -3px -3px 8px var(--shadow-light),
                0 0 0 3px rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Neumorphic Buttons */
        .button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .button-primary {
            background: linear-gradient(135deg, #ffffff 0%, #d0d0d0 100%);
            color: #000000;
            box-shadow: 
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
            font-weight: 700;
        }

        .button-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                8px 8px 16px var(--shadow-dark),
                -8px -8px 16px var(--shadow-light);
        }

        .button-primary:active {
            transform: translateY(-1px);
            box-shadow: 
                4px 4px 8px var(--shadow-dark),
                -4px -4px 8px var(--shadow-light);
        }

        .button-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
        }

        .button-secondary:hover {
            box-shadow: 
                6px 6px 14px var(--shadow-dark),
                -6px -6px 14px var(--shadow-light);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .button-secondary:active {
            box-shadow: 
                inset 2px 2px 6px var(--shadow-dark),
                inset -2px -2px 6px var(--shadow-light);
            transform: scale(0.98);
        }

        .button-danger {
            background: var(--bg-secondary);
            color: #e8e8e8;
            padding: 10px 12px;
            font-size: 1rem;
            box-shadow: 
                3px 3px 8px var(--shadow-dark),
                -3px -3px 8px var(--shadow-light);
        }

        .button-danger:hover {
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
            color: #ffffff;
            background: #2a2a2a;
        }

        .button-danger:active {
            box-shadow: 
                inset 2px 2px 6px var(--shadow-dark),
                inset -2px -2px 6px var(--shadow-light);
        }

        /* Actions Row */
        .actions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .actions-row {
                grid-template-columns: 1fr;
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Alert Messages */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #3a2a2a;
            color: #f0a0a0;
            border-left: 4px solid #e0a0a0;
        }

        .alert-success {
            background: #2a3a2a;
            color: #a0f0a0;
            border-left: 4px solid #a0e0a0;
        }

        .alert-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1.3rem;
            margin-left: auto;
            padding: 0;
            transition: transform 0.2s ease;
        }

        .alert-close:hover {
            transform: scale(1.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header {
                margin-bottom: 30px;
            }

            .course-row {
                grid-template-columns: 1fr;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }

            .main-grid {
                gap: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>GPA Calculator</h1>
        </div>

        <!-- Tabs -->
        <div class="tabs-container" id="tabsContainer">
            <button class="tab active" data-semester="1">Semester 1</button>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Results Card -->
        <div class="results-card card">
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">Total Credits</div>
                    <div class="result-value" id="totalCredits">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Grade Points</div>
                    <div class="result-value" id="totalGradePoints">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Final GPA</div>
                    <div class="result-value" id="finalGPA">0.00</div>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <div class="card form-section">
            <h2 class="form-title">Add Subjects</h2>
            
            <div class="courses-list" id="coursesList"></div>

            <div class="actions-row">
                <button class="button button-primary" id="addCourseBtn">
                    <span>+</span> Add Subject
                </button>
                <button class="button button-primary" id="calculateBtn">
                    📊 Calculate GPA
                </button>
            </div>

            <div class="button-group">
                <button class="button button-secondary" id="addSemesterBtn">
                    <span>+</span> Add Semester
                </button>
                <button class="button button-secondary" id="resetBtn">
                    🔄 Reset All
                </button>
            </div>
        </div>
    </div>

    <script>
        // Grade Scale
        const GRADE_SCALE = {
            'A+': 4.0,
            'A': 4.0,
            'A-': 3.7,
            'B+': 3.3,
            'B': 3.0,
            'B-': 2.7,
            'C+': 2.3,
            'C': 2.0,
            'C-': 1.7,
            'D+': 1.3,
            'D': 1.0,
            'D-': 0.7,
            'F': 0.0
        };

        // App State
        let appState = {
            semesters: {},
            currentSemester: '1'
        };

        // DOM Elements
        const coursesList = document.getElementById('coursesList');
        const addCourseBtn = document.getElementById('addCourseBtn');
        const calculateBtn = document.getElementById('calculateBtn');
        const addSemesterBtn = document.getElementById('addSemesterBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tabsContainer = document.getElementById('tabsContainer');
        const alertContainer = document.getElementById('alertContainer');

        // Initialize
        function init() {
            loadFromLocalStorage();
            setupEventListeners();
            renderCourses();
            calculateGPA();
        }

        // Event Listeners
        function setupEventListeners() {
            addCourseBtn.addEventListener('click', addCourse);
            calculateBtn.addEventListener('click', calculateGPA);
            addSemesterBtn.addEventListener('click', addSemester);
            resetBtn.addEventListener('click', resetAll);
        }

        // Course Management
        function addCourse() {
            if (!appState.semesters[appState.currentSemester]) {
                appState.semesters[appState.currentSemester] = [];
            }
            
            const newCourse = {
                id: Date.now(),
                name: '',
                grade: 'A',
                credits: '3'
            };
            
            appState.semesters[appState.currentSemester].push(newCourse);
            renderCourses();
            saveToLocalStorage();
        }

        function removeCourse(id) {
            const courses = appState.semesters[appState.currentSemester];
            const index = courses.findIndex(c => c.id === id);
            if (index > -1) {
                courses.splice(index, 1);
                renderCourses();
                calculateGPA();
                saveToLocalStorage();
            }
        }

        function updateCourse(id, field, value) {
            const course = appState.semesters[appState.currentSemester].find(c => c.id === id);
            if (course) {
                course[field] = value;
                saveToLocalStorage();
                if (field === 'grade' || field === 'credits') {
                    calculateGPA();
                }
            }
        }

        // Rendering
        function renderCourses() {
            const courses = appState.semesters[appState.currentSemester] || [];
            
            if (courses.length === 0) {
                coursesList.innerHTML = '<div class="empty-state"><span class="empty-state-icon">📚</span><p>No subjects added yet. Click "Add Subject" to get started!</p></div>';
                return;
            }

            coursesList.innerHTML = courses.map(course => `
                <div class="course-row">
                    <div class="form-group">
                        <label class="form-label">Subject Name</label>
                        <input 
                            type="text" 
                            placeholder="e.g., Mathematics, Physics"
                            value="${course.name}"
                            oninput="updateCourse(${course.id}, 'name', this.value)"
                        >
                    </div>
                    <div class="form-group">
                        <label class="form-label">Grade</label>
                        <select onchange="updateCourse(${course.id}, 'grade', this.value)">
                            ${Object.keys(GRADE_SCALE).map(grade => `
                                <option value="${grade}" ${course.grade === grade ? 'selected' : ''}>${grade}</option>
                            `).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Credits</label>
                        <input 
                            type="number" 
                            min="1" 
                            max="6"
                            value="${course.credits}"
                            oninput="updateCourse(${course.id}, 'credits', this.value)"
                        >
                    </div>
                    <button class="button button-danger" onclick="removeCourse(${course.id})" title="Remove subject">×</button>
                </div>
            `).join('');
        }

        function renderTabs() {
            const semesterNumbers = Object.keys(appState.semesters).sort((a, b) => parseInt(a) - parseInt(b));
            
            tabsContainer.innerHTML = semesterNumbers.map(num => `
                <button class="tab ${appState.currentSemester === num ? 'active' : ''}" 
                    data-semester="${num}"
                    onclick="switchSemester('${num}')">
                    Semester ${num}
                </button>
            `).join('');
        }

        // Semester Management
        function switchSemester(semesterNum) {
            appState.currentSemester = semesterNum;
            renderCourses();
            calculateGPA();
            renderTabs();
        }

        function addSemester() {
            const newSemesterNum = Math.max(
                0,
                ...Object.keys(appState.semesters).map(Number)
            ) + 1;
            
            appState.semesters[newSemesterNum.toString()] = [];
            appState.currentSemester = newSemesterNum.toString();
            renderTabs();
            renderCourses();
            saveToLocalStorage();
            showAlert('✨ New semester added!', 'success');
        }

        // Calculations
        function calculateGPA() {
            const courses = appState.semesters[appState.currentSemester] || [];
            
            if (courses.length === 0) {
                updateResults(0, 0, 0);
                return;
            }

            let validCourses = courses.filter(c => c.name.trim() !== '');
            
            if (validCourses.length === 0) {
                updateResults(0, 0, 0);
                return;
            }

            let totalCredits = 0;
            let totalGradePoints = 0;

            validCourses.forEach(course => {
                const credits = parseFloat(course.credits) || 0;
                const gradePoint = GRADE_SCALE[course.grade] || 0;
                
                totalCredits += credits;
                totalGradePoints += gradePoint * credits;
            });

            const gpa = totalCredits > 0 ? (totalGradePoints / totalCredits).toFixed(2) : 0;
            
            updateResults(totalCredits, totalGradePoints.toFixed(2), gpa);
        }

        function updateResults(credits, gradePoints, gpa) {
            document.getElementById('totalCredits').textContent = Math.round(credits);
            document.getElementById('totalGradePoints').textContent = parseFloat(gradePoints).toFixed(2);
            document.getElementById('finalGPA').textContent = parseFloat(gpa).toFixed(2);
        }

        // Alerts
        function showAlert(message, type = 'error') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span>${message}</span>
                <button class="alert-close" onclick="this.parentElement.remove()">×</button>
            `;
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                if (alert.parentElement) alert.remove();
            }, 4000);
        }

        // Reset
        function resetAll() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
                appState.semesters = { '1': [] };
                appState.currentSemester = '1';
                localStorage.removeItem('gpaCalculatorData');
                renderTabs();
                renderCourses();
                calculateGPA();
                showAlert('🗑️ All data cleared!', 'success');
            }
        }

        // Local Storage
        function saveToLocalStorage() {
            localStorage.setItem('gpaCalculatorData', JSON.stringify(appState));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('gpaCalculatorData');
            if (saved) {
                appState = JSON.parse(saved);
            } else {
                appState.semesters['1'] = [];
            }
        }

        // Initialize app
        init();
    </script>
</body>
</html>
